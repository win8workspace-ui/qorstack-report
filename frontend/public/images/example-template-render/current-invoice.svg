<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 560" role="img" aria-label="Rendered invoice PDF" text-rendering="geometricPrecision" shape-rendering="crispEdges">
  <defs><clipPath id="paper"><rect x="20" y="20" width="380" height="520" rx="10"/></clipPath></defs>
  <rect width="420" height="560" fill="#e2e8f0"/>
  <g clip-path="url(#paper)">
  <rect x="20" y="20" width="380" height="520" fill="#ffffff"/>

  <!-- Header -->
  <rect x="20" y="20" width="380" height="56" fill="#0f172a"/>
  <text x="40" y="56" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff" shape-rendering="geometricPrecision">QORSTACK CORP.</text>
  <text x="380" y="56" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="3" shape-rendering="geometricPrecision">INVOICE</text>

  <!-- Meta -->
  <text x="40" y="108" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700" fill="#94a3b8" letter-spacing="1" shape-rendering="geometricPrecision">BILL TO</text>
  <text x="40" y="126" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#0f172a" shape-rendering="geometricPrecision">Acme Co., Ltd.</text>
  <text x="40" y="142" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b" shape-rendering="geometricPrecision">contact@acme.example</text>

  <text x="380" y="108" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700" fill="#94a3b8" letter-spacing="1" shape-rendering="geometricPrecision">INVOICE NO.</text>
  <text x="380" y="126" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#0f172a" shape-rendering="geometricPrecision">INV-2026-001</text>
  <text x="380" y="142" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b" shape-rendering="geometricPrecision">15 Mar 2026</text>

  <!-- Table header -->
  <rect x="20" y="172" width="380" height="28" fill="#0f172a"/>
  <text x="40" y="190" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#ffffff" letter-spacing="1" shape-rendering="geometricPrecision">DESCRIPTION</text>
  <text x="280" y="190" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#ffffff" letter-spacing="1" shape-rendering="geometricPrecision">QTY</text>
  <text x="380" y="190" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#ffffff" letter-spacing="1" shape-rendering="geometricPrecision">AMOUNT</text>

  <!-- Table rows -->
  <g font-family="Inter, Arial, sans-serif" font-size="11" fill="#0f172a" shape-rendering="geometricPrecision">
    <text x="40" y="222">Design system audit</text>
    <text x="280" y="222" text-anchor="end">2</text>
    <text x="380" y="222" text-anchor="end">2,400</text>
    <rect x="20" y="232" width="380" height="1" fill="#e2e8f0"/>

    <text x="40" y="250">Implementation sprint</text>
    <text x="280" y="250" text-anchor="end">1</text>
    <text x="380" y="250" text-anchor="end">5,200</text>
    <rect x="20" y="260" width="380" height="1" fill="#e2e8f0"/>

    <text x="40" y="278">Project management</text>
    <text x="280" y="278" text-anchor="end">3</text>
    <text x="380" y="278" text-anchor="end">1,800</text>
    <rect x="20" y="288" width="380" height="1" fill="#e2e8f0"/>

    <text x="40" y="306">Maintenance retainer</text>
    <text x="280" y="306" text-anchor="end">1</text>
    <text x="380" y="306" text-anchor="end">1,200</text>
  </g>

  <!-- Total -->
  <rect x="220" y="332" width="180" height="36" fill="#0f172a"/>
  <text x="240" y="356" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#94a3b8" letter-spacing="1" shape-rendering="geometricPrecision">TOTAL THB</text>
  <text x="380" y="356" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff" shape-rendering="geometricPrecision">10,600</text>

