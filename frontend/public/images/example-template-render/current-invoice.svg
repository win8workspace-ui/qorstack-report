  <rect x="40" y="424" width="84" height="84" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <g fill="#0f172a">
    <rect x="46" y="430" width="18" height="18"/>
    <rect x="50" y="434" width="10" height="10" fill="#ffffff"/>
    <rect x="52" y="436" width="6" height="6"/>
    <rect x="100" y="430" width="18" height="18"/>
    <rect x="104" y="434" width="10" height="10" fill="#ffffff"/>
    <rect x="106" y="436" width="6" height="6"/>
    <rect x="46" y="484" width="18" height="18"/>
    <rect x="50" y="488" width="10" height="10" fill="#ffffff"/>
    <rect x="52" y="490" width="6" height="6"/>
    <rect x="68" y="430" width="4" height="4"/><rect x="76" y="430" width="4" height="4"/><rect x="88" y="430" width="4" height="4"/>
    <rect x="68" y="438" width="4" height="4"/><rect x="80" y="438" width="4" height="4"/>
    <rect x="72" y="446" width="4" height="4"/><rect x="84" y="446" width="4" height="4"/><rect x="92" y="446" width="4" height="4"/>
    <rect x="68" y="456" width="4" height="4"/><rect x="76" y="456" width="4" height="4"/><rect x="92" y="456" width="4" height="4"/><rect x="100" y="456" width="4" height="4"/>
    <rect x="72" y="464" width="4" height="4"/><rect x="84" y="464" width="4" height="4"/><rect x="108" y="464" width="4" height="4"/>
    <rect x="68" y="472" width="4" height="4"/><rect x="80" y="472" width="4" height="4"/><rect x="92" y="472" width="4" height="4"/><rect x="100" y="472" width="4" height="4"/>
    <rect x="72" y="480" width="4" height="4"/><rect x="88" y="480" width="4" height="4"/>
    <rect x="68" y="488" width="4" height="4"/><rect x="84" y="488" width="4" height="4"/><rect x="100" y="488" width="4" height="4"/>
    <rect x="76" y="496" width="4" height="4"/><rect x="92" y="496" width="4" height="4"/><rect x="108" y="496" width="4" height="4"/>
  </g>
  <text x="144" y="442" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#0f172a" shape-rendering="geometricPrecision">PromptPay</text>
  <text x="144" y="460" font-family="Inter, Arial, sans-serif" font-size="10" fill="#475569" shape-rendering="geometricPrecision">pay.qorstack.dev/inv-001</text>
  <text x="144" y="482" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700" fill="#94a3b8" letter-spacing="1" shape-rendering="geometricPrecision">REFERENCE</text>
  <text x="144" y="498" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#0f172a" shape-rendering="geometricPrecision">INV-2026-001</text>
