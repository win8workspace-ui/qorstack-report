<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 560" role="img" aria-label="Protected contract PDF" text-rendering="geometricPrecision" shape-rendering="crispEdges">
  <defs><clipPath id="paper"><rect x="20" y="20" width="380" height="520" rx="10"/></clipPath></defs>
  <rect width="420" height="560" fill="#e2e8f0"/>
  <g clip-path="url(#paper)">
  <rect x="20" y="20" width="380" height="520" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="68" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700" fill="#94a3b8" letter-spacing="1" shape-rendering="geometricPrecision">SERVICE AGREEMENT</text>
  <text x="40" y="96" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a" shape-rendering="geometricPrecision">Master Services Contract</text>
  <text x="40" y="116" font-family="Inter, Arial, sans-serif" font-size="11" fill="#475569" shape-rendering="geometricPrecision">Ref. MSA-2026-0317-ACME</text>

  <!-- Parties -->
  <rect x="40" y="140" width="340" height="76" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="56" y="160" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700" fill="#94a3b8" letter-spacing="1" shape-rendering="geometricPrecision">BETWEEN</text>
  <text x="56" y="180" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#0f172a" shape-rendering="geometricPrecision">Qorstack Corp.</text>
  <text x="56" y="198" font-family="Inter, Arial, sans-serif" font-size="10" fill="#475569" shape-rendering="geometricPrecision">(Provider)</text>

  <text x="220" y="160" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700" fill="#94a3b8" letter-spacing="1" shape-rendering="geometricPrecision">AND</text>
  <text x="220" y="180" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#0f172a" shape-rendering="geometricPrecision">Acme Co., Ltd.</text>
  <text x="220" y="198" font-family="Inter, Arial, sans-serif" font-size="10" fill="#475569" shape-rendering="geometricPrecision">(Client)</text>

  <!-- Effective date -->
  <text x="40" y="244" font-family="Inter, Arial, sans-serif" font-size="11" fill="#0f172a" shape-rendering="geometricPrecision">Effective Date: 15 March 2026</text>
  <text x="40" y="264" font-family="Inter, Arial, sans-serif" font-size="11" fill="#0f172a" shape-rendering="geometricPrecision">Term: 12 months, auto-renewing</text>

  <!-- Watermark -->
  <text x="210" y="360" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="700" fill="#0f172a" opacity="0.1" transform="rotate(-22 210 360)" letter-spacing="6" shape-rendering="geometricPrecision">CONFIDENTIAL</text>

  <!-- Signature blocks -->
  <rect x="40" y="430" width="150" height="1" fill="#94a3b8"/>
  <text x="40" y="448" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#0f172a" shape-rendering="geometricPrecision">Sarawut B.</text>
  <text x="40" y="464" font-family="Inter, Arial, sans-serif" font-size="9" fill="#94a3b8" shape-rendering="geometricPrecision">Provider · 15 Mar 2026</text>

  <rect x="230" y="430" width="150" height="1" fill="#94a3b8"/>
  <text x="230" y="448" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#0f172a" shape-rendering="geometricPrecision">John Doe</text>
  <text x="230" y="464" font-family="Inter, Arial, sans-serif" font-size="9" fill="#94a3b8" shape-rendering="geometricPrecision">Client · 15 Mar 2026</text>

  <!-- Security badges -->
  <rect x="40" y="498" width="100" height="26" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="90" y="516" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#92400e" shape-rendering="geometricPrecision">PDF Password</text>

  <rect x="148" y="498" width="92" height="26" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="194" y="516" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#5b21b6" shape-rendering="geometricPrecision">Watermark</text>

  <rect x="248" y="498" width="64" height="26" fill="#dcfce7" stroke="#16a34a"/>
  <text x="280" y="516" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#14532d" shape-rendering="geometricPrecision">ZIP</text>
  </g>
  <rect x="20" y="20" width="380" height="520" rx="10" fill="none" stroke="#cbd5e1"/>
</svg>
