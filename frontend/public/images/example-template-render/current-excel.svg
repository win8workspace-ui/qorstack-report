  <text x="240" y="334" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#14532d" shape-rendering="geometricPrecision">15,000</text>
  <text x="380" y="334" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#14532d" shape-rendering="geometricPrecision">฿ 37,610,000</text>

