<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Template variables example" text-rendering="geometricPrecision" shape-rendering="crispEdges">
  <defs><clipPath id="paper"><rect x="80" y="20" width="640" height="360" rx="10"/></clipPath></defs>
  <rect width="800" height="400" fill="#f1f5f9"/>
  <g clip-path="url(#paper)">
  <rect x="80" y="20" width="640" height="360" fill="#ffffff"/>

  <!-- Header band -->
  <rect x="80" y="20" width="640" height="56" fill="#0f172a"/>
  <text x="108" y="56" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff" shape-rendering="geometricPrecision">INVOICE</text>
  <text x="692" y="56" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#94a3b8" letter-spacing="2" shape-rendering="geometricPrecision">TEMPLATE</text>

  <!-- BILL TO -->
  <text x="108" y="112" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1.2" shape-rendering="geometricPrecision">BILL TO</text>
  <text x="108" y="138" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="700" fill="#2563eb" shape-rendering="geometricPrecision">{{customer_name}}</text>

  <text x="108" y="178" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1.2" shape-rendering="geometricPrecision">EMAIL</text>
  <text x="108" y="202" font-family="Menlo, Consolas, monospace" font-size="14" fill="#2563eb" shape-rendering="geometricPrecision">{{customer_email}}</text>

  <!-- Invoice number / dates (right side) -->
  <text x="692" y="112" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1.2" shape-rendering="geometricPrecision">INVOICE NO.</text>
  <text x="692" y="138" text-anchor="end" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="700" fill="#2563eb" shape-rendering="geometricPrecision">{{invoice_no}}</text>

  <text x="692" y="178" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1.2" shape-rendering="geometricPrecision">ISSUE DATE</text>
  <text x="692" y="202" text-anchor="end" font-family="Menlo, Consolas, monospace" font-size="14" fill="#2563eb" shape-rendering="geometricPrecision">{{issue_date}}</text>

  <!-- Divider -->
  <rect x="108" y="232" width="584" height="1" fill="#e2e8f0"/>

  <!-- TOTAL row -->
  <text x="108" y="266" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1.2" shape-rendering="geometricPrecision">AMOUNT DUE</text>
  <text x="108" y="298" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a" shape-rendering="geometricPrecision">฿</text>
  <text x="132" y="298" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700" fill="#2563eb" shape-rendering="geometricPrecision">{{total}}</text>

  <!-- Notes block -->
  <rect x="108" y="320" width="584" height="40" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="124" y="338" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#94a3b8" letter-spacing="1.2" shape-rendering="geometricPrecision">NOTES</text>
  <text x="124" y="354" font-family="Menlo, Consolas, monospace" font-size="13" fill="#2563eb" shape-rendering="geometricPrecision">{{notes}}</text>
  </g>
  <rect x="80" y="20" width="640" height="360" rx="10" fill="none" stroke="#cbd5e1"/>
</svg>
