<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Template image placeholder example" text-rendering="geometricPrecision" shape-rendering="crispEdges">
  <defs><clipPath id="paper"><rect x="40" y="20" width="720" height="360" rx="10"/></clipPath></defs>
  <rect width="800" height="400" fill="#f1f5f9"/>
  <g clip-path="url(#paper)">
  <rect x="40" y="20" width="720" height="360" fill="#ffffff"/>

  <text x="64" y="60" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1.2" shape-rendering="geometricPrecision">EMBEDDED IMAGE</text>
  <text x="64" y="88" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a" shape-rendering="geometricPrecision">Logo on letterhead</text>

  <!-- Left: image placeholder box -->
  <rect x="64" y="116" width="240" height="240" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="6 4"/>
  <rect x="156" y="160" width="56" height="44" fill="#ffffff" stroke="#94a3b8"/>
  <circle cx="174" cy="178" r="5" fill="#94a3b8"/>
  <path d="M156 200 l16 -16 l12 8 l16 -10 l12 14 z" fill="#cbd5e1"/>
  <text x="184" y="232" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1.2" shape-rendering="geometricPrecision">IMAGE PLACEHOLDER</text>
  <text x="184" y="262" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="14" font-weight="700" fill="#2563eb" shape-rendering="geometricPrecision">{{image:logo}}</text>

  <!-- Right: JSON binding -->
  <rect x="336" y="116" width="400" height="240" fill="#0f172a"/>
  <text x="360" y="146" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1.2" shape-rendering="geometricPrecision">JSON PAYLOAD</text>
  <text x="360" y="180" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94a3b8" shape-rendering="geometricPrecision">{</text>
  <text x="376" y="208" font-family="Menlo, Consolas, monospace" font-size="14" fill="#7dd3fc" shape-rendering="geometricPrecision">"image"</text>
  <text x="444" y="208" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94a3b8" shape-rendering="geometricPrecision">: {</text>
  <text x="392" y="236" font-family="Menlo, Consolas, monospace" font-size="14" fill="#7dd3fc" shape-rendering="geometricPrecision">"logo"</text>
  <text x="450" y="236" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94a3b8" shape-rendering="geometricPrecision">: {</text>
  <text x="408" y="262" font-family="Menlo, Consolas, monospace" font-size="14" fill="#a7f3d0" shape-rendering="geometricPrecision">"source": "https://...png",</text>
  <text x="408" y="286" font-family="Menlo, Consolas, monospace" font-size="14" fill="#a7f3d0" shape-rendering="geometricPrecision">"width": 160,</text>
  <text x="408" y="310" font-family="Menlo, Consolas, monospace" font-size="14" fill="#a7f3d0" shape-rendering="geometricPrecision">"fit": "contain"</text>
  <text x="392" y="334" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94a3b8" shape-rendering="geometricPrecision">}</text>
  <text x="376" y="334" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94a3b8" shape-rendering="geometricPrecision">  </text>
  <text x="392" y="334" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94a3b8" shape-rendering="geometricPrecision">}</text>
  </g>
  <rect x="40" y="20" width="720" height="360" rx="10" fill="none" stroke="#cbd5e1"/>
</svg>
