<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Template QR code example" text-rendering="geometricPrecision" shape-rendering="crispEdges">
  <defs><clipPath id="paper"><rect x="40" y="20" width="720" height="360" rx="10"/></clipPath></defs>
  <rect width="800" height="400" fill="#f1f5f9"/>
  <g clip-path="url(#paper)">
  <rect x="40" y="20" width="720" height="360" fill="#ffffff"/>

  <text x="64" y="60" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1.2" shape-rendering="geometricPrecision">QR CODE PLACEHOLDER</text>
  <text x="64" y="88" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a" shape-rendering="geometricPrecision">Event ticket QR</text>

  <!-- Left: marker box -->
  <rect x="64" y="116" width="240" height="240" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="6 4"/>
  <text x="184" y="226" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1.2" shape-rendering="geometricPrecision">QR PLACEHOLDER</text>
  <text x="184" y="254" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="14" font-weight="700" fill="#2563eb" shape-rendering="geometricPrecision">{{qrcode:ticket_qr}}</text>
  <!-- Small QR preview -->
  <rect x="132" y="148" width="104" height="56" fill="#ffffff" stroke="#0f172a"/>
  <g fill="#0f172a">
    <rect x="140" y="156" width="14" height="14"/>
    <rect x="144" y="160" width="6" height="6" fill="#ffffff"/>
    <rect x="216" y="156" width="14" height="14"/>
    <rect x="220" y="160" width="6" height="6" fill="#ffffff"/>
    <rect x="140" y="186" width="14" height="14"/>
    <rect x="144" y="190" width="6" height="6" fill="#ffffff"/>
    <rect x="160" y="160" width="4" height="4"/>
    <rect x="168" y="160" width="4" height="4"/>
    <rect x="184" y="160" width="4" height="4"/>
    <rect x="200" y="160" width="4" height="4"/>
    <rect x="164" y="168" width="4" height="4"/>
    <rect x="176" y="168" width="4" height="4"/>
    <rect x="188" y="168" width="4" height="4"/>
    <rect x="204" y="168" width="4" height="4"/>
    <rect x="160" y="176" width="4" height="4"/>
    <rect x="180" y="176" width="4" height="4"/>
    <rect x="196" y="176" width="4" height="4"/>
    <rect x="208" y="176" width="4" height="4"/>
    <rect x="168" y="184" width="4" height="4"/>
    <rect x="184" y="184" width="4" height="4"/>
    <rect x="200" y="184" width="4" height="4"/>
    <rect x="160" y="192" width="4" height="4"/>
    <rect x="176" y="192" width="4" height="4"/>
    <rect x="188" y="192" width="4" height="4"/>
    <rect x="208" y="192" width="4" height="4"/>
  </g>

  <!-- Right: JSON binding -->
  <rect x="336" y="116" width="400" height="240" fill="#0f172a"/>
  <text x="360" y="146" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1.2" shape-rendering="geometricPrecision">JSON PAYLOAD</text>
  <text x="360" y="180" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94a3b8" shape-rendering="geometricPrecision">{</text>
  <text x="376" y="208" font-family="Menlo, Consolas, monospace" font-size="14" fill="#7dd3fc" shape-rendering="geometricPrecision">"qrcode"</text>
  <text x="452" y="208" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94a3b8" shape-rendering="geometricPrecision">: {</text>
  <text x="392" y="236" font-family="Menlo, Consolas, monospace" font-size="14" fill="#7dd3fc" shape-rendering="geometricPrecision">"ticket_qr"</text>
  <text x="492" y="236" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94a3b8" shape-rendering="geometricPrecision">: {</text>
  <text x="408" y="262" font-family="Menlo, Consolas, monospace" font-size="14" fill="#a7f3d0" shape-rendering="geometricPrecision">"text": "https://q.r/T42",</text>
  <text x="408" y="286" font-family="Menlo, Consolas, monospace" font-size="14" fill="#a7f3d0" shape-rendering="geometricPrecision">"size": 200,</text>
  <text x="408" y="310" font-family="Menlo, Consolas, monospace" font-size="14" fill="#a7f3d0" shape-rendering="geometricPrecision">"color": "#0F172A"</text>
  <text x="392" y="334" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94a3b8" shape-rendering="geometricPrecision">}</text>
  </g>
  <rect x="40" y="20" width="720" height="360" rx="10" fill="none" stroke="#cbd5e1"/>
</svg>
