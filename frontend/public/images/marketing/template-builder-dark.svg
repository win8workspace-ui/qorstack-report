<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Template builder with auto variable mapping" text-rendering="geometricPrecision" shape-rendering="crispEdges">
  <defs>
    <clipPath id="card"><rect x="20" y="20" width="760" height="560" rx="14"/></clipPath>
    <linearGradient id="primaryBtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF5A5F"/>
      <stop offset="1" stop-color="#D7333B"/>
    </linearGradient>
  </defs>

  <!-- Outer canvas -->
  <rect width="800" height="600" fill="#0a0a0a"/>
  <g clip-path="url(#card)">
  <rect x="20" y="20" width="760" height="560" fill="#0f0f10"/>

  <!-- App chrome / top bar -->
  <rect x="20" y="20" width="760" height="40" fill="#08080a"/>
  <circle cx="44" cy="40" r="5" fill="#3f3f46"/>
  <circle cx="60" cy="40" r="5" fill="#3f3f46"/>
  <circle cx="76" cy="40" r="5" fill="#3f3f46"/>
  <rect x="120" y="30" width="220" height="20" rx="4" fill="#1a1a1c"/>
  <text x="135" y="44" font-family="Inter, sans-serif" font-size="11" fill="#a1a1aa">Templates / Builder</text>

  <!-- Template name header -->
  <rect x="40" y="80" width="720" height="44" rx="8" fill="#141416" stroke="#26262a"/>
  <text x="60" y="108" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#fafafa">Digital Signed Visa_v2</text>
  <rect x="232" y="92" width="40" height="20" rx="4" fill="rgba(255,90,95,0.15)" stroke="#FF5A5F" stroke-opacity="0.5"/>
  <text x="252" y="106" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#FF5A5F" letter-spacing="0.5">PDF</text>
  <rect x="280" y="92" width="130" height="20" rx="4" fill="#1a1a1c"/>
  <text x="290" y="106" font-family="Menlo, monospace" font-size="9" fill="#d4d4d8">QOR-7381-600-3132</text>
  <!-- Update button right -->
  <rect x="640" y="90" width="100" height="24" rx="6" fill="url(#primaryBtn)"/>
  <text x="690" y="105" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#ffffff">Update Template</text>

  <!-- Tabs -->
  <rect x="40" y="140" width="720" height="32" rx="8" fill="#141416" stroke="#26262a"/>
  <rect x="50" y="148" width="100" height="16" rx="4" fill="rgba(255,90,95,0.12)"/>
  <text x="100" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#FF5A5F" letter-spacing="0.5">BUILDER UI</text>
  <text x="180" y="160" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#52525b" letter-spacing="0.5">CODE</text>

  <!-- LEFT: Variables panel -->
  <rect x="40" y="184" width="320" height="380" rx="8" fill="#141416" stroke="#26262a"/>
  <!-- Categories nav -->
  <rect x="40" y="184" width="86" height="380" rx="8" fill="#0c0c0e"/>
  <rect x="120" y="184" width="6" height="380" fill="#0c0c0e"/>
  <text x="56" y="208" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#52525b" letter-spacing="1">PRIMITIVES</text>
  <!-- Active Variables row -->
  <rect x="48" y="216" width="68" height="22" rx="4" fill="rgba(255,90,95,0.15)"/>
  <text x="58" y="231" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#FF5A5F">Variables</text>
  <text x="108" y="231" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#FF5A5F">23</text>
  <text x="58" y="252" font-family="Inter, sans-serif" font-size="9" fill="#a1a1aa">Tables</text>
  <text x="108" y="252" font-family="Inter, sans-serif" font-size="8" fill="#71717a">0</text>
  <text x="58" y="271" font-family="Inter, sans-serif" font-size="9" fill="#a1a1aa">Images</text>
  <text x="108" y="271" font-family="Inter, sans-serif" font-size="8" fill="#71717a">3</text>
  <text x="58" y="290" font-family="Inter, sans-serif" font-size="9" fill="#a1a1aa">QR Codes</text>
  <text x="108" y="290" font-family="Inter, sans-serif" font-size="8" fill="#71717a">2</text>
  <text x="58" y="309" font-family="Inter, sans-serif" font-size="9" fill="#a1a1aa">Barcodes</text>
  <text x="108" y="309" font-family="Inter, sans-serif" font-size="8" fill="#71717a">3</text>
  <text x="56" y="346" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#52525b" letter-spacing="1">CONFIG</text>
  <text x="58" y="368" font-family="Inter, sans-serif" font-size="9" fill="#a1a1aa">Settings</text>

  <!-- Variables list header -->
  <text x="140" y="208" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#fafafa">Variables</text>
  <text x="140" y="224" font-family="Inter, sans-serif" font-size="9" fill="#71717a">Text tokens replaced at render time</text>
  <!-- Add btn -->
  <rect x="282" y="196" width="70" height="20" rx="4" fill="#1f1f23"/>
  <text x="317" y="210" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#d4d4d8">+ Add</text>

  <!-- Filled / Empty counter -->
  <text x="140" y="246" font-family="Inter, sans-serif" font-size="9" fill="#a1a1aa">
    <tspan font-weight="700" fill="#fafafa">5/23</tspan> filled · <tspan fill="#fbbf24">18 empty</tspan>
  </text>

  <!-- Variable rows with values -->
  <g font-family="Menlo, monospace" font-size="9">
    <rect x="140" y="262" width="208" height="22" rx="4" fill="#1a1a1c"/>
    <rect x="146" y="266" width="84" height="14" rx="3" fill="#0c0c0e"/>
    <text x="152" y="276" fill="#7dd3fc">{{VISA_CERT_ID}}</text>
    <rect x="236" y="266" width="106" height="14" rx="3" fill="#08080a"/>
    <text x="242" y="276" fill="#86efac">V-2026-A4F2</text>

    <rect x="140" y="288" width="208" height="22" rx="4" fill="#1a1a1c"/>
    <rect x="146" y="292" width="84" height="14" rx="3" fill="#0c0c0e"/>
    <text x="152" y="302" fill="#7dd3fc">{{NAME}}</text>
    <rect x="236" y="292" width="106" height="14" rx="3" fill="#08080a"/>
    <text x="242" y="302" fill="#86efac">John Doe</text>

    <rect x="140" y="314" width="208" height="22" rx="4" fill="#1a1a1c"/>
    <rect x="146" y="318" width="84" height="14" rx="3" fill="#0c0c0e"/>
    <text x="152" y="328" fill="#7dd3fc">{{COMPANY_TH}}</text>
    <rect x="236" y="318" width="106" height="14" rx="3" fill="#08080a"/>
    <text x="242" y="328" fill="#86efac">บ. เอซมี จก.</text>

    <rect x="140" y="340" width="208" height="22" rx="4" fill="#1a1a1c"/>
    <rect x="146" y="344" width="84" height="14" rx="3" fill="#0c0c0e"/>
    <text x="152" y="354" fill="#7dd3fc">{{DATE_NOW}}</text>
    <rect x="236" y="344" width="106" height="14" rx="3" fill="#08080a"/>
    <text x="242" y="354" fill="#86efac">15 Mar 2026</text>

    <rect x="140" y="366" width="208" height="22" rx="4" fill="#1a1a1c"/>
    <rect x="146" y="370" width="84" height="14" rx="3" fill="#0c0c0e"/>
    <text x="152" y="380" fill="#7dd3fc">{{INCENTIVE_NO}}</text>
    <rect x="236" y="370" width="106" height="14" rx="3" fill="#1a1a1c" stroke="#3f3f46" stroke-dasharray="2 2"/>
    <text x="242" y="380" fill="#52525b">Type value…</text>

    <rect x="140" y="392" width="208" height="22" rx="4" fill="#1a1a1c" opacity="0.6"/>
    <rect x="146" y="396" width="84" height="14" rx="3" fill="#0c0c0e"/>
    <text x="152" y="406" fill="#7dd3fc">{{PASSPORT_NO}}</text>
    <rect x="236" y="396" width="106" height="14" rx="3" fill="#1a1a1c" stroke="#3f3f46" stroke-dasharray="2 2"/>
    <text x="242" y="406" fill="#52525b">Type value…</text>

    <rect x="140" y="418" width="208" height="22" rx="4" fill="#1a1a1c" opacity="0.4"/>
    <rect x="146" y="422" width="84" height="14" rx="3" fill="#0c0c0e"/>
    <text x="152" y="432" fill="#7dd3fc">{{BIRTH_DATE}}</text>
    <rect x="236" y="422" width="106" height="14" rx="3" fill="#1a1a1c" stroke="#3f3f46" stroke-dasharray="2 2"/>
    <text x="242" y="432" fill="#52525b">Type value…</text>
  </g>

  <!-- RIGHT: PDF Preview -->
  <rect x="380" y="184" width="380" height="380" rx="8" fill="#f8fafc" stroke="#26262a"/>
  <!-- Preview header -->
  <rect x="380" y="184" width="380" height="32" rx="8" fill="#e4e4e7"/>
  <rect x="380" y="200" width="380" height="16" fill="#e4e4e7"/>
  <text x="396" y="204" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#18181b">Preview</text>
  <rect x="652" y="190" width="100" height="20" rx="4" fill="#18181b"/>
  <text x="702" y="204" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#ffffff" letter-spacing="0.5">⚡ Generate</text>

  <!-- Preview content -->
  <g font-family="Inter, sans-serif" font-size="11" fill="#18181b">
    <text x="404" y="244">เรื่อง <tspan fill="#FF5A5F" font-family="Menlo, monospace" font-size="10" font-weight="700">{{NAME}}</tspan> รับรองสิทธิประโยชน์</text>
    <text x="404" y="266">เพื่อขอรับการตรวจลงตราประเภทคนอยู่</text>
    <text x="404" y="288">ชั่วคราวเป็นกรณีพิเศษ (EEC Visa)</text>
    <text x="404" y="320">ที่ <tspan fill="#FF5A5F" font-family="Menlo, monospace" font-size="10" font-weight="700">{{VISA_CERT_ID}}</tspan></text>
    <text x="404" y="344">ตามที่ <tspan fill="#FF5A5F" font-family="Menlo, monospace" font-size="10" font-weight="700">{{COMPANY_TH}}</tspan></text>
    <text x="404" y="368" font-size="10" fill="#52525b">เลขที่ <tspan fill="#FF5A5F" font-family="Menlo, monospace" font-size="9" font-weight="700">{{JURISTIC_NUMBER}}</tspan></text>
  </g>

  <!-- Body lines (placeholder text) -->
  <g fill="#d4d4d8">
    <rect x="404" y="386" width="332" height="4" rx="2"/>
    <rect x="404" y="396" width="316" height="4" rx="2"/>
    <rect x="404" y="406" width="328" height="4" rx="2"/>
    <rect x="404" y="416" width="280" height="4" rx="2"/>
    <rect x="404" y="432" width="332" height="4" rx="2"/>
    <rect x="404" y="442" width="296" height="4" rx="2"/>
  </g>

  <!-- Signature area -->
  <rect x="540" y="496" width="180" height="46" rx="6" fill="#f1f5f9" stroke="#d4d4d8"/>
  <text x="630" y="520" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#52525b">DIGITAL SIGNATURE</text>
  <text x="630" y="534" text-anchor="middle" font-family="Menlo, monospace" font-size="8" fill="#a1a1aa">eSign Verified</text>

  </g>

  <!-- Outer border -->
  <rect x="20" y="20" width="760" height="560" rx="14" fill="none" stroke="#26262a"/>
</svg>
